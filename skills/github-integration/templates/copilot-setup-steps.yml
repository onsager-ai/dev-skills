# GitHub Integration — Copilot Setup Steps Template
#
# Enables GitHub CLI (`gh`) and project tools in Claude Code cloud
# and GitHub Copilot coding agent sessions.
#
# INSTALL: Copy this file to .github/copilot-setup-steps.yml in your repo.
#
# CUSTOMIZE: Update the dependency installation and build steps
# to match your project's stack. The gh auth step should stay first.

name: "Copilot Setup Steps"

on: repository_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- gh CLI authentication ---
      # The GITHUB_TOKEN is provided automatically by the cloud session.
      # This step verifies gh can use it.
      - name: Authenticate gh CLI
        run: gh auth status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

