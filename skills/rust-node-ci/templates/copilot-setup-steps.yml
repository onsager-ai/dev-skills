# Hybrid CI — Copilot Setup Steps Template
#
# Enables GitHub Copilot to build and use your project's tools
# when assisting with code in the web editor.
#
# CUSTOMIZE: Update the build steps and tool installation
# commands to match your project.

name: "Copilot Setup Steps"

on: repository_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build project
        run: pnpm build

      # CUSTOMIZE: Install your CLI tools globally so Copilot can use them
      # - run: npm install -g ./packages/cli
